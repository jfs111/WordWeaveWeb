<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Weave Web — Inscription</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-logo">
            <h1>✦ Word Weave Web</h1>
            <p>Créez votre compte</p>
        </div>

        <div class="err-msg" id="errorMsg"></div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="fg">
                <label for="name">Nom complet</label>
                <input type="text" id="name" class="fc" placeholder="Jean Dupont" required minlength="2">
            </div>
            <div class="fg">
                <label for="email">Adresse email</label>
                <input type="email" id="email" class="fc" placeholder="vous@exemple.com" required>
            </div>
            <div class="fg">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" class="fc" placeholder="Minimum 6 caractères" required minlength="6">
            </div>
            <div class="fg">
                <label for="password2">Confirmer le mot de passe</label>
                <input type="password" id="password2" class="fc" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-p" id="submitBtn">
                Créer mon compte
            </button>
        </form>

        <div class="auth-footer">
            Déjà inscrit ? <a href="/">Se connecter</a>
        </div>
    </div>
</div>

<script src="/static/js/app.js"></script>
<script>
    if (API.isAuthenticated()) window.location.href = '/dashboard';

    async function handleRegister(e) {
        e.preventDefault();
        const pwd = $('#password').value;
        const pwd2 = $('#password2').value;

        if (pwd !== pwd2) {
            showError($('#errorMsg'), 'Les mots de passe ne correspondent pas');
            return;
        }

        const btn = $('#submitBtn');
        btn.disabled = true;
        btn.textContent = 'Création...';

        try {
            await API.register($('#email').value, $('#name').value, pwd);
            window.location.href = '/dashboard';
        } catch (err) {
            showError($('#errorMsg'), err.message);
            btn.disabled = false;
            btn.textContent = 'Créer mon compte';
        }
    }
</script>
</body>
</html>
